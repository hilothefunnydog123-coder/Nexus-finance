<!doctype html><html><head><meta charset="utf-8"><style>
  body{ width:260px; margin:0; font-family:ui-monospace,Menlo,monospace; background:#0b0f1e; color:#dfe6ff }
  .h{ padding:14px 16px; border-bottom:1px solid rgba(255,255,255,.08); display:flex; align-items:center; gap:8px }
  .dot{ width:8px;height:8px;border-radius:99px;background:#10b981;box-shadow:0 0 8px #10b981 }
  .b{ padding:14px 16px; font-size:12px; line-height:1.6; color:#9aa3c8 }
  .stat{ font-size:13px; font-weight:700; margin-bottom:8px }
  .ok{ color:#10b981 } .no{ color:#f5a623 }
  button{ width:100%; margin-top:10px; background:linear-gradient(135deg,#1f3bff,#10b981); color:#fff; border:none; border-radius:10px; padding:10px; font-weight:700; cursor:pointer; font-family:inherit }
  a{ color:#7e9bff }
</style></head><body>
  <div class="h"><span class="dot"></span><b>YN Copilot</b><span style="margin-left:auto;font-size:10px;color:#7e8db5">v0.1</span></div>
  <div class="b">
    <div class="stat" id="stat">checking…</div>
    <div id="hint"></div>
    <button id="toggle">Wake copilot (Alt+Y)</button>
    <div style="margin-top:12px">It only activates on <b>tradingview.com</b>. Talk or type to mark levels, read structure, and write indicators.</div>
  </div>
  <script src="popup.js"></script>
</body></html>
