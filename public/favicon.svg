<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#101826"/>
      <stop offset="100%" stop-color="#070b14"/>
    </linearGradient>
  </defs>

  <!-- deep-ink tile -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="7.5" fill="none" stroke="#ffffff" stroke-opacity="0.10"/>

  <!-- rising-trend accent + peak node -->
  <polyline points="5,25 27,18.5" fill="none" stroke="#22d3ee" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="27" cy="18.5" r="3.4" fill="#22d3ee" fill-opacity="0.28"/>
  <circle cx="27" cy="18.5" r="1.7" fill="#ffffff"/>

  <!-- YN monogram -->
  <text x="16" y="15.5" text-anchor="middle" dominant-baseline="middle"
        font-family="system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="15" font-weight="800" letter-spacing="-1.2" fill="#ffffff">YN</text>
</svg>
